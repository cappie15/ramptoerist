<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c53030">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Ramptoerist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:      #f7fafc;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --muted:   #718096;
      --accent:  #c53030;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #171923;
        --surface: #2d3748;
        --border:  #4a5568;
        --text:    #e2e8f0;
        --muted:   #a0aec0;
        --accent:  #fc8181;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
    }

    .hdr {
      background: #c53030;
      color: #fff;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hdr-icon  { font-size: 1.35rem }
    .hdr-title { font-weight: 700; font-size: 1.05rem }
    .hdr-sub   { font-size: 0.65rem; opacity: 0.8 }
    .hdr-status {
      margin-left: auto;
      font-size: 0.72rem;
      opacity: 0.85;
      text-align: right;
      white-space: nowrap;
    }

    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none }

    .chip {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    #list { list-style: none }

    .card {
      display: flex;
      gap: 11px;
      align-items: flex-start;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { opacity: 0.65 }

    .card-icon  { font-size: 1.25rem; flex-shrink: 0; padding-top: 1px }
    .card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.35 }
    .card-meta  {
      margin-top: 4px;
      font-size: 0.74rem;
      color: var(--muted);
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge { font-weight: 700; font-size: 0.7rem; padding: 1px 5px; border-radius: 4px }
    .p1    { color: #e53e3e; background: rgba(229,62,62,.12) }
    .p2    { color: #dd6b20; background: rgba(221,107,32,.12) }
    .p3    { color: var(--muted) }

    .state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
    }
    .spinner {
      display: block;
      width: 28px; height: 28px;
      margin: 0 auto 12px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    .err {
      margin: 14px;
      padding: 14px 16px;
      background: rgba(229,62,62,.1);
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .err details { margin-top: 8px }
    .err summary { cursor: pointer; font-size: 0.78rem; color: var(--muted) }
    .err pre {
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .retry {
      margin-top: 10px;
      padding: 8px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<header class="hdr">
  <span class="hdr-icon">🚨</span>
  <div>
    <div class="hdr-title">Ramptoerist</div>
    <div class="hdr-sub">P2000 · 112 · Realtime</div>
  </div>
  <div class="hdr-status" id="status">Laden…</div>
</header>

<div class="filters" id="timeFilter">
  <button class="chip"    data-h="1">1 uur</button>
  <button class="chip on" data-h="2">2 uur</button>
  <button class="chip"    data-h="6">6 uur</button>
  <button class="chip"    data-h="24">24 uur</button>
  <button class="chip"    data-h="0">Alles</button>
</div>

<ul id="list"></ul>

<script>
// ── Configuratie ──────────────────────────────────────────────────────────────
// CORS-proxies worden in volgorde geprobeerd
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
]

const FEEDS = [
  'https://www.p2000-online.net/p2000.xml',
  'https://feeds.alarmeringen.nl/feed/all',
  'https://www.p2000.nl/p2000.xml',
]

const REFRESH_MS = 60_000

// ── State ─────────────────────────────────────────────────────────────────────
let all = [], hoursBack = 2

// ── Hulpfuncties ──────────────────────────────────────────────────────────────
function icon(title) {
  const t = title.toLowerCase()
  if (/brandweer|\bbrand\b|rook|vlam|bhv/.test(t))              return '🔥'
  if (/\bambu\b|ambulan|\bmaz\b|mmaz|trauma|reanimati/.test(t)) return '🚑'
  if (/politie|\bobj\s+\d/.test(t))                             return '🚔'
  if (/\bheli\b|traumaheli/.test(t))                            return '🚁'
  if (/redding|verdrink|reddingsbrigade/.test(t))               return '🚤'
  return '🔔'
}

function prio(title) {
  const m = /\bp([123])\b/i.exec(title) || /prio\s*([123])/i.exec(title)
  return m ? +m[1] : 0
}

function ago(d) {
  const m = Math.round((Date.now() - d) / 60_000)
  if (m <  2)  return 'zojuist'
  if (m < 60)  return `${m} min`
  const h = Math.floor(m / 60), r = m % 60
  return r ? `${h}u ${r}m` : `${h}u`
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Fetch met proxy-fallback ───────────────────────────────────────────────────
async function fetchFeed(url) {
  const errors = []
  for (const makeUrl of PROXIES) {
    try {
      const res = await fetch(makeUrl(url), { signal: AbortSignal.timeout(9000) })
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const text = await res.text()
      // Sanity check: response must look like XML
      if (!text.trim().startsWith('<')) throw new Error('Geen XML ontvangen')
      return text
    } catch (e) {
      errors.push(`${makeUrl(url).split('?')[0]}: ${e.message}`)
    }
  }
  throw new Error(errors.join('\n'))
}

// ── XML parseren ──────────────────────────────────────────────────────────────
function parseItems(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml')
  if (doc.querySelector('parsererror')) return []
  return [...doc.querySelectorAll('item, entry')].flatMap(el => {
    const txt   = sel => el.querySelector(sel)?.textContent?.trim() ?? ''
    const title = txt('title')
    const link  = el.querySelector('link[href]')?.getAttribute('href') || txt('link') || txt('id')
    const guid  = txt('guid') || txt('id') || link
    const raw   = txt('pubDate') || txt('published') || txt('updated')
    const date  = raw ? new Date(raw) : null
    if (!title || !date || isNaN(date.getTime())) return []
    return [{ title, link, guid, date, p: prio(title) }]
  })
}

// ── Renderen ──────────────────────────────────────────────────────────────────
function render() {
  const cutoff = hoursBack ? Date.now() - hoursBack * 3_600_000 : 0
  const items  = all.filter(i => i.date >= cutoff)
  const ul     = document.getElementById('list')

  if (!items.length) {
    ul.innerHTML = '<li class="state">Geen incidenten in dit tijdvenster</li>'
    return
  }

  ul.innerHTML = items.map(i => {
    const badge = i.p ? `<span class="badge p${i.p}">P${i.p}</span>` : ''
    const wrap  = i.link
      ? `<a class="card" href="${esc(i.link)}" target="_blank" rel="noopener">`
      : '<div class="card">'
    const close = i.link ? '</a>' : '</div>'
    return `${wrap}
      <span class="card-icon">${icon(i.title)}</span>
      <div>
        <div class="card-title">${esc(i.title)}</div>
        <div class="card-meta">${badge}<span>${ago(i.date)}</span></div>
      </div>
    ${close}`
  }).join('')
}

// ── Laden ─────────────────────────────────────────────────────────────────────
async function load() {
  const statusEl = document.getElementById('status')
  statusEl.textContent = 'Laden…'
  document.getElementById('list').innerHTML =
    '<li class="state"><span class="spinner"></span>Incidenten ophalen…</li>'

  const results = await Promise.allSettled(FEEDS.map(fetchFeed))
  const failLog = []
  const seen    = new Set()
  const items   = []

  for (let i = 0; i < results.length; i++) {
    const r = results[i]
    if (r.status === 'rejected') {
      failLog.push(`${FEEDS[i]}\n${r.reason?.message}`)
      continue
    }
    for (const item of parseItems(r.value)) {
      if (!seen.has(item.guid)) { seen.add(item.guid); items.push(item) }
    }
  }

  if (!items.length) {
    const detail = failLog.length
      ? `<details><summary>Technische details (${failLog.length} fout${failLog.length > 1 ? 'en' : ''})</summary><pre>${esc(failLog.join('\n\n'))}</pre></details>`
      : ''
    document.getElementById('list').innerHTML = `
      <div class="err">
        <strong>⚠️ Kon geen incidenten laden</strong><br>
        Alle CORS-proxies gaven een fout. Controleer je verbinding of probeer opnieuw.
        ${detail}
        <br><button class="retry" onclick="load()">Opnieuw proberen</button>
      </div>`
    statusEl.textContent = 'Fout'
    return
  }

  // Toon partial warning als sommige feeds faalden maar anderen slaagden
  all = items.sort((a, b) => b.date - a.date)
  render()

  const time = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
  const warn = failLog.length ? ` (${failLog.length} bron${failLog.length > 1 ? 'nen' : ''} fout)` : ''
  statusEl.textContent = `${items.length}${warn} · ${time}`
}

// ── Tijdfilter ────────────────────────────────────────────────────────────────
document.getElementById('timeFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-h]')
  if (!btn) return
  hoursBack = +btn.dataset.h
  document.querySelectorAll('#timeFilter .chip').forEach(c => c.classList.toggle('on', c === btn))
  render()
})

// ── Start + auto-refresh ──────────────────────────────────────────────────────
load()
setInterval(load, REFRESH_MS)
</script>
</body>
</html>
