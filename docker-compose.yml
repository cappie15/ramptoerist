services:
  ramptoerist:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /app/data
      REAL_DATA: "true"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-*}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/ingest/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
